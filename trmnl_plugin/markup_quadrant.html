<!-- Claude Code Dashboard — Quadrant (400x240) -->

<div class="layout layout--col">

  <div class="grid grid--cols-3 lg:grid--cols-2 lg:portrait:grid--cols-1">
    <div class="flex flex--col flex--stretch-x">
      <span class="label label--filled">EXTRA</span>
      <span class="value value--xxsmall lg:value--small">${{ extra_spent }}</span>
    </div>
    <div class="flex flex--col flex--stretch-x">
      <span class="label label--small">Session</span>
      <span class="value value--xxsmall lg:value--small">{{ session_pct }}%</span>
    </div>
    <div class="flex flex--col flex--stretch-x">
      <span class="label label--small">Week</span>
      <span class="value value--xxsmall lg:value--small">{{ week_all_pct }}%</span>
    </div>
  </div>

  <div class="flex flex--row gap--small">
    <span class="label label--filled">{{ primary_model }}</span>
    <span class="label label--small">{{ active_now }} run</span>
    <span class="label label--small">&middot;</span>
    <span class="label label--small">{{ streak }}d streak</span>
    <span class="label label--small">&middot;</span>
    <span class="label label--small">{{ cache_pct }}% cache</span>
  </div>

</div>

<div class="title_bar">
  <span class="title">Claude &middot; ~${{ today_cost }}</span>
  <span class="instance">{{ updated_at }}</span>
</div>

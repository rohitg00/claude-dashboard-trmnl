<!-- Claude Code Dashboard — Half Horizontal (800x240) -->

<div class="view">
  <div class="layout layout--col">

    <div class="columns">
      <div class="column">
        <span class="label label--filled">EXTRA</span>
        <span class="value value--small">${{ extra_spent }}</span>
      </div>
      <div class="column">
        <span class="label label--small">Month</span>
        <span class="value value--small">${{ month_cost }}</span>
      </div>
      <div class="column">
        <span class="label label--small">Session</span>
        <span class="value value--small">{{ session_pct }}%</span>
      </div>
      <div class="column">
        <span class="label label--small">Week</span>
        <span class="value value--small">{{ week_all_pct }}%</span>
      </div>
      <div class="column">
        <span class="value value--small">{{ active_now }}</span>
        <span class="label label--small">Running</span>
      </div>
      <div class="column">
        <span class="value value--small">{{ cache_pct }}%</span>
        <span class="label label--small">Cache</span>
      </div>
    </div>

  </div>
</div>

<div class="title_bar">
  <span class="title">Claude &middot; {{ streak }}d streak &middot; {{ today_requests }} reqs &middot; {{ today_tokens }} tok</span>
  <span class="instance">{{ updated_at }}</span>
</div>

<!-- Claude Code Dashboard — Half Horizontal view -->

<div class="view">
  <div class="layout layout--col gap--medium">

    <div class="columns">
      <div class="column">
        <div class="layout layout--col">
          <span class="label label--small">Today</span>
          <span class="value value--small lg:value--large">${{ today_cost }}</span>
        </div>
      </div>
      <div class="column">
        <div class="layout layout--col">
          <span class="label label--small">Month</span>
          <span class="value value--small lg:value--large">${{ month_cost }}</span>
        </div>
      </div>
      <div class="column">
        <div class="layout layout--col">
          <span class="label label--small">Session</span>
          <span class="value value--small lg:value--large">{{ session_pct }}%</span>
        </div>
      </div>
      <div class="column">
        <div class="layout layout--col">
          <span class="label label--small">Week</span>
          <span class="value value--small lg:value--large">{{ week_all_pct }}%</span>
        </div>
      </div>
    </div>

    <div class="layout layout--row gap--large">
      <span class="label label--small">{{ active_now }} running</span>
      <span class="label label--small">&middot;</span>
      <span class="label label--small">{{ today_requests }} reqs</span>
      <span class="label label--small">&middot;</span>
      <span class="label label--small">{{ cache_pct }}% cache</span>
      <span class="label label--small">&middot;</span>
      <span class="label label--small label--inverted">{{ primary_model }}</span>
    </div>

  </div>
</div>

<div class="title_bar">
  <span class="title">Claude Code &middot; {{ plugin_count }} plugins</span>
  <span class="instance">{{ updated_at }}</span>
</div>
